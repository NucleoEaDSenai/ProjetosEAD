ight:1.6;color:#7C2D12\"><strong>Atenção:<\u002Fstrong> apenas usuários com <strong>“Liderança”<\u002Fstrong> no nome podem confirmar as medições. Os demais usuários conseguem apenas consultar a página de medição.<\u002Fdiv><\u002Fdiv>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:30px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#1A8A4A;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">1<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Entenda como um projeto chega aqui<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0\">Quando o projeto tem <strong>todas as etapas concluídas<\u002Fstrong> (para cursos, ao preencher a <strong>Instalação no SIRH<\u002Fstrong> em Homologações), ele é enviado <strong>automaticamente<\u002Fstrong> para a tela de Medição e fica aguardando confirmação.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:30px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#1A8A4A;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">2<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Marque “Medição Feita” e confirme<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 14px\">Na tabela, cada projeto mostra quando foi concluído e enviado. Marque a caixa <strong>Medição Feita<\u002Fstrong> e o sistema registra quem <strong>confirmou<\u002Fstrong>.<\u002Fp>\n              <div style=\"border:1px solid #E2E0DA;border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.05);background:#fff\">\n                <div style=\"display:grid;grid-template-columns:1.4fr 1fr .8fr .9fr;background:#0D0D0D;color:rgba(255,255,255,.6);font-size:10px;font-weight:700;text-transform:uppercase\"><div style=\"padding:9px 12px\">Projeto<\u002Fdiv><div style=\"padding:9px 8px\">Enviado em<\u002Fdiv><div style=\"padding:9px 8px;text-align:center\">Feita<\u002Fdiv><div style=\"padding:9px 8px\">Confirmada por<\u002Fdiv><\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:1.4fr 1fr .8fr .9fr;align-items:center;border-bottom:1px solid #F2F1ED\"><div style=\"padding:11px 12px;font-size:12.5px;font-weight:600\">Ética Turma 2<\u002Fdiv><div style=\"padding:11px 8px;font-size:12px;color:#6B6860\">18/06/2026<\u002Fdiv><div style=\"padding:11px 8px;text-align:center\"><span style=\"width:18px;height:18px;border-radius:5px;background:#1A8A4A;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px\">✓<\u002Fspan><\u002Fdiv><div style=\"padding:11px 8px;font-size:12px;color:#6B6860\">Daniel<\u002Fdiv><\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:1.4fr 1fr .8fr .9fr;align-items:center\"><div style=\"padding:11px 12px;font-size:12.5px;font-weight:600\">NR-35<\u002Fdiv><div style=\"padding:11px 8px;font-size:12px;color:#6B6860\">20/06/2026<\u002Fdiv><div style=\"padding:11px 8px;text-align:center\"><span style=\"width:18px;height:18px;border-radius:5px;border:2px solid #cfd4dc;display:inline-block\"><\u002Fspan><\u002Fdiv><div style=\"padding:11px 8px;font-size:12px;color:#b8b6ad\">—<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:20px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#1A8A4A;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">3<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Filtre por responsável ou por quem confirmou<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0\">Use os filtros <strong>Confirmada Por<\u002Fstrong> e <strong>Responsável<\u002Fstrong> para localizar projetos e conferir o que ainda falta medir.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:11px;padding:15px 17px;background:#F0FDF4;border:1px solid #bbf7d0;border-radius:12px\">\n            <span style=\"font-size:18px\">💡<\u002Fspan>\n            <div style=\"font-size:13.5px;line-height:1.6;color:#166534\"><strong>Dica:<\u002Fstrong> a medição é organizada por <strong>quinzena<\u002Fstrong>. Confirme sempre dentro do período correto para que o faturamento entre no fechamento certo.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ══════ TUTORIAL 10 — CANCELADOS ══════ -->\n      <sc-if value=\"{{ isT10 }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"max-width:840px;margin:0 auto;animation:caFade .4s ease both\">\n          <div style=\"display:inline-block;background:#F3F4F6;color:#374151;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 11px;border-radius:6px;margin-bottom:14px\">Administração<\u002Fdiv>\n          <h1 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:30px;font-weight:800;line-height:1.15;margin:0 0 12px\">Como consultar projetos cancelados<\u002Fh1>\n          <p style=\"font-size:15px;line-height:1.65;color:#4A4741;margin:0 0 34px;max-width:680px\">Cancelar um projeto <strong>não o apaga<\u002Fstrong>: ele sai do Kanban e vai para a aba <strong>Cancelados<\u002Fstrong>, com o motivo registrado — pronto para relatórios e para reativação, se necessário.<\u002Fp>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:30px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#6B7280;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">1<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Como cancelar um projeto<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 14px\">Abra o projeto, escolha a opção de <strong>cancelar<\u002Fstrong> e descreva o <strong>motivo do cancelamento<\u002Fstrong>. O projeto passa a aparecer em Cancelados.<\u002Fp>\n              <div style=\"border:1px solid #E2E0DA;border-radius:12px;background:#fff;padding:16px 18px;box-shadow:0 4px 16px rgba(0,0,0,.05)\">\n                <div style=\"font-size:11px;font-weight:600;color:#6B6860;margin-bottom:5px\">Motivo do Cancelamento<\u002Fdiv>\n                <div style=\"border:1px solid #DDD9D0;border-radius:7px;padding:10px 12px;font-size:12.5px;color:#4A4741;min-height:52px\">Cliente suspendeu a demanda para 2027.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:20px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#6B7280;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">2<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Consulte a lista de cancelados<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 14px\">A tabela mostra quando o projeto foi criado e cancelado, em qual coluna estava, o <strong>progresso<\u002Fstrong> alcançado e o motivo. Se precisar, o projeto pode ser <strong>reativado<\u002Fstrong> e volta ao Kanban.<\u002Fp>\n              <div style=\"border:1px solid #E2E0DA;border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.05);background:#fff\">\n                <div style=\"display:grid;grid-template-columns:1.3fr .9fr 1fr .7fr;background:#0D0D0D;color:rgba(255,255,255,.6);font-size:10px;font-weight:700;text-transform:uppercase\"><div style=\"padding:9px 12px\">Projeto<\u002Fdiv><div style=\"padding:9px 8px\">Cancelado em<\u002Fdiv><div style=\"padding:9px 8px\">Motivo<\u002Fdiv><div style=\"padding:9px 8px;text-align:center\">Progresso<\u002Fdiv><\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:1.3fr .9fr 1fr .7fr;align-items:center\"><div style=\"padding:11px 12px;font-size:12.5px;font-weight:600\">Onboarding 2025<\u002Fdiv><div style=\"padding:11px 8px;font-size:12px;color:#6B6860\">02/05/2026<\u002Fdiv><div style=\"padding:11px 8px;font-size:12px;color:#6B6860\">Demanda suspensa<\u002Fdiv><div style=\"padding:11px 8px;text-align:center;font-size:12px;font-weight:700;color:#D97706\">40%<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:11px;padding:15px 17px;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:12px\">\n            <span style=\"font-size:18px\">💡<\u002Fspan>\n            <div style=\"font-size:13.5px;line-height:1.6;color:#374151\"><strong>Dica:<\u002Fstrong> sempre escreva um motivo claro. Ele é o que aparece nos relatórios e ajuda a entender depois por que aquele projeto não seguiu.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ══════ TUTORIAL 11 — LIXEIRA ══════ -->\n      <sc-if value=\"{{ isT11 }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"max-width:840px;margin:0 auto;animation:caFade .4s ease both\">\n          <div style=\"display:inline-block;background:#FEF2F2;color:#991B1B;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 11px;border-radius:6px;margin-bottom:14px\">Administração<\u002Fdiv>\n          <h1 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:30px;font-weight:800;line-height:1.15;margin:0 0 12px\">Como usar a lixeira de cards<\u002Fh1>\n          <p style=\"font-size:15px;line-height:1.65;color:#4A4741;margin:0 0 34px;max-width:680px\">Quando um card é <strong>deletado<\u002Fstrong>, ele não desaparece de vez: vai para a tela <strong>Cards Deletados<\u002Fstrong>, onde pode ser consultado ou restaurado.<\u002Fp>\n\n          <div style=\"display:flex;gap:11px;padding:14px 17px;background:#FEF2F2;border:1px solid #fecaca;border-radius:12px;margin-bottom:28px\">\n            <span style=\"font-size:18px\">🔒<\u002Fspan>\n            <div style=\"font-size:13.5px;line-height:1.6;color:#991B1B\"><strong>Atenção:<\u002Fstrong> apenas usuários com <strong>“Liderança”<\u002Fstrong> no nome podem deletar projetos. Os demais usuários conseguem apenas consultar a lixeira.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:30px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#E8002D;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">1<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Abra “Cards Deletados”<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 14px\">Você vê o histórico com o nome do projeto, <strong>quando<\u002Fstrong> foi deletado, <strong>por quem<\u002Fstrong> e o <strong>motivo<\u002Fstrong> da exclusão.<\u002Fp>\n              <div style=\"border:1px solid #E2E0DA;border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.05);background:#fff\">\n                <div style=\"display:grid;grid-template-columns:1.3fr .9fr .9fr 1.1fr;background:#0D0D0D;color:rgba(255,255,255,.6);font-size:10px;font-weight:700;text-transform:uppercase\"><div style=\"padding:9px 12px\">Projeto<\u002Fdiv><div style=\"padding:9px 8px\">Deletado em<\u002Fdiv><div style=\"padding:9px 8px\">Por<\u002Fdiv><div style=\"padding:9px 8px\">Motivo<\u002Fdiv><\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:1.3fr .9fr .9fr 1.1fr;align-items:center\"><div style=\"padding:11px 12px;font-size:12.5px;font-weight:600\">Curso Piloto (teste)<\u002Fdiv><div style=\"padding:11px 8px;font-size:12px;color:#6B6860\">28/04/2026<\u002Fdiv><div style=\"padding:11px 8px;font-size:12px;color:#6B6860\">Liderança Julia<\u002Fdiv><div style=\"padding:11px 8px;font-size:12px;color:#6B6860\">Card duplicado<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:20px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#E8002D;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">2<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Busque e filtre<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 12px\">Encontre um card pelo <strong>nome ou motivo<\u002Fstrong>, ou filtre por <strong>quem deletou<\u002Fstrong> e por <strong>período<\u002Fstrong> (7, 30, 90 dias, último ano).<\u002Fp>\n              <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n                <span style=\"border:1px solid #DDD9D0;background:#fff;border-radius:8px;padding:7px 12px;font-size:12px;color:#4A4741\">🔍 Buscar…<\u002Fspan>\n                <span style=\"border:1px solid #DDD9D0;background:#fff;border-radius:8px;padding:7px 12px;font-size:12px;color:#4A4741\">Deletado por ▾<\u002Fspan>\n                <span style=\"border:1px solid #DDD9D0;background:#fff;border-radius:8px;padding:7px 12px;font-size:12px;color:#4A4741\">Período ▾<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:11px;padding:15px 17px;background:#FEF2F2;border:1px solid #fecaca;border-radius:12px\">\n            <span style=\"font-size:18px\">💡<\u002Fspan>\n            <div style=\"font-size:13.5px;line-height:1.6;color:#991B1B\"><strong>Dica:<\u002Fstrong> antes de deletar, avalie se <strong>cancelar<\u002Fstrong> não é melhor. Cancelar preserva o projeto para relatórios; deletar é para cards criados por engano ou duplicados.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ══════ TUTORIAL 12 — HISTÓRICO ══════ -->\n      <sc-if value=\"{{ isT12 }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"max-width:840px;margin:0 auto;animation:caFade .4s ease both\">\n          <div style=\"display:inline-block;background:#FEF9C3;color:#854D0E;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 11px;border-radius:6px;margin-bottom:14px\">Administração<\u002Fdiv>\n          <h1 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:30px;font-weight:800;line-height:1.15;margin:0 0 12px\">Como ver o histórico de edições<\u002Fh1>\n          <p style=\"font-size:15px;line-height:1.65;color:#4A4741;margin:0 0 34px;max-width:680px\">O <strong>Histórico<\u002Fstrong> registra tudo o que acontece nos projetos — criações, edições, etapas concluídas, movimentações, cancelamentos, medições e mais. É a linha do tempo do sistema.<\u002Fp>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:30px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#CA8A04;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">1<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Leia a linha do tempo<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 14px\">Cada registro mostra <strong>quem<\u002Fstrong> fez a ação, <strong>o que<\u002Fstrong> aconteceu e <strong>quando<\u002Fstrong>.<\u002Fp>\n              <div style=\"border:1px solid #E2E0DA;border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.05);background:#fff\">\n                <div style=\"display:flex;align-items:center;gap:11px;padding:12px 16px;border-bottom:1px solid #F2F1ED\"><span style=\"font-size:16px\">✨<\u002Fspan><div style=\"flex:1;font-size:13px\"><strong>Mariana<\u002Fstrong> criou o projeto <strong>Segurança M3<\u002Fstrong><\u002Fdiv><span style=\"font-size:11px;color:#9a988f\">há 2h<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:11px;padding:12px 16px;border-bottom:1px solid #F2F1ED\"><span style=\"font-size:16px\">✅<\u002Fspan><div style=\"flex:1;font-size:13px\"><strong>Thiago<\u002Fstrong> concluiu a etapa <strong>Elaboração do PI<\u002Fstrong><\u002Fdiv><span style=\"font-size:11px;color:#9a988f\">há 5h<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:11px;padding:12px 16px\"><span style=\"font-size:16px\">📌<\u002Fspan><div style=\"flex:1;font-size:13px\"><strong>Simone<\u002Fstrong> moveu <strong>Ética Turma 2<\u002Fstrong> para Desenvolvimento<\u002Fdiv><span style=\"font-size:11px;color:#9a988f\">ontem<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:20px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#CA8A04;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">2<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Filtre por usuário ou tipo de ação<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 12px\">Quer ver só o que uma pessoa fez, ou apenas os cancelamentos? Use os filtros de <strong>Usuário<\u002Fstrong> e <strong>Ação<\u002Fstrong>.<\u002Fp>\n              <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n                <span style=\"border:1px solid #DDD9D0;background:#fff;border-radius:8px;padding:7px 12px;font-size:12px;color:#4A4741\">Usuário ▾<\u002Fspan>\n                <span style=\"border:1px solid #DDD9D0;background:#fff;border-radius:8px;padding:7px 12px;font-size:12px;color:#4A4741\">Ação ▾<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:11px;padding:15px 17px;background:#FEFCE8;border:1px solid #fef08a;border-radius:12px\">\n            <span style=\"font-size:18px\">💡<\u002Fspan>\n            <div style=\"font-size:13.5px;line-height:1.6;color:#854D0E\"><strong>Dica:<\u002Fstrong> o histórico é ótimo para tirar dúvidas do tipo “quem mudou esse prazo?”. Como tudo fica registrado, é a fonte de verdade quando algo parece fora do lugar.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n\n\n    <\u002Fdiv>\n\n    <!-- prev / next footer -->\n    <sc-if value=\"{{ isTutorial }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"border-top:1px solid #DDD9D0;background:#fff;padding:18px 34px;display:flex;align-items:center;justify-content:space-between;gap:14px\">\n        <sc-if value=\"{{ prevShow }}\" hint-placeholder-val=\"{{ false }}\">\n          <button onclick=\"{{ prevGo }}\" style=\"background:transparent;border:1px solid #DDD9D0;border-radius:10px;padding:10px 16px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;color:#1A1A1A;text-align:left;max-width:44%\" style-hover=\"background:#F2F1ED\"><span style=\"display:block;font-size:10.5px;color:#9a988f;margin-bottom:2px\">← Anterior<\u002Fspan><span style=\"font-weight:600\">{{ prevLabel }}<\u002Fspan><\u002Fbutton>\n        <\u002Fsc-if>\n        <div style=\"flex:1\"><\u002Fdiv>\n        <sc-if value=\"{{ nextShow }}\" hint-placeholder-val=\"{{ false }}\">\n          <button onclick=\"{{ nextGo }}\" style=\"background:#E8002D;border:none;border-radius:10px;padding:10px 18px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;color:#fff;text-align:right;max-width:44%\" style-hover=\"background:#c4001f\"><span style=\"display:block;font-size:10.5px;color:rgba(255,255,255,.7);margin-bottom:2px\">Próximo →<\u002Fspan><span style=\"font-weight:600\">{{ nextLabel }}<\u002Fspan><\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { view: 'home' };\n\n  nav(v){\n    this.setState({ view: v });\n    try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch(e){}\n  }\n\n  renderVals(){\n    const v = this.state.view;\n    const TUT = [\n      { id:'t1',  num:'01', icon:'➕', iconBg:'#FEE2E2', title:'Criar um novo projeto', desc:'Cadastre um curso do zero em 3 abas simples.' },\n      { id:'t3',  num:'02', icon:'▦',  iconBg:'#EFF4FF', title:'Usar o quadro Kanban', desc:'Mova projetos e conclua etapas do fluxo de produção.' },\n      { id:'t4',  num:'03', icon:'✏️', iconBg:'#F3E8FF', title:'Editar e atualizar um projeto', desc:'Altere dados, prazos e marque etapas concluídas.' },\n      { id:'t8',  num:'04', icon:'📅', iconBg:'#EDE9FE', title:'Acompanhar o cronograma', desc:'Veja os prazos dos projetos no gráfico de Gantt.' },\n      { id:'t2',  num:'05', icon:'🔖', iconBg:'#FEF3C7', title:'Verificar as homologações', desc:'Preencha dados e acompanhe o status de cada curso.' },\n      { id:'t9',  num:'06', icon:'📐', iconBg:'#CFFAFE', title:'Confirmar a medição', desc:'Acompanhe e confirme os projetos enviados para medição.' },\n      { id:'t5',  num:'07', icon:'📊', iconBg:'#DCFCE7', title:'Ler os KPIs e indicadores', desc:'Entenda os números de desempenho da equipe.' },\n      { id:'t6',  num:'08', icon:'⏰', iconBg:'#FEE2E2', title:'Acompanhar os atrasos', desc:'Encontre e filtre etapas e projetos atrasados.' },\n      { id:'t7',  num:'09', icon:'👥', iconBg:'#E0F2FE', title:'Ver a carga da equipe', desc:'Veja o que está na mão de cada pessoa agora.' },\n      { id:'t10', num:'10', icon:'🚫', iconBg:'#F3F4F6', title:'Consultar projetos cancelados', desc:'Registre motivos e acompanhe os cancelamentos.' },\n      { id:'t11', num:'11', icon:'🗑️', iconBg:'#FEF2F2', title:'Usar a lixeira de cards', desc:'Consulte e restaure projetos que foram excluídos.' },\n      { id:'t12', num:'12', icon:'📝', iconBg:'#FEF9C3', title:'Ver o histórico de edições', desc:'Saiba quem alterou o quê e quando no sistema.' },\n    ];\n\n    const menu = [{ id:'home', icon:'🏠', label:'Início' }].concat(TUT.map(t=>({ id:t.id, icon:t.icon, label:t.title })))\n      .map(m=>{\n        const on = v === m.id;\n        return {\n          ...m,\n          onClick: () => this.nav(m.id),\n          bg: on ? 'rgba(232,0,45,.14)' : 'transparent',\n          bl: on ? '#E8002D' : 'transparent',\n          col: on ? '#ffffff' : 'rgba(255,255,255,.72)',\n        };\n      });\n\n    const cards = TUT.map(t=>({ ...t, onClick: () => this.nav(t.id) }));\n\n    const order = TUT.map(t=>t.id);\n    const idx = order.indexOf(v);\n    const cur = TUT.find(t=>t.id===v) || null;\n    const prev = idx > 0 ? TUT[idx-1] : null;\n    const next = (idx >= 0 && idx < TUT.length-1) ? TUT[idx+1] : null;\n\n    return {\n      view: v,\n      isHome: v === 'home',\n      isTutorial: v !== 'home',\n      isT1: v==='t1', isT2: v==='t2', isT3: v==='t3', isT4: v==='t4',\n      isT5: v==='t5', isT6: v==='t6', isT7: v==='t7',\n      isT8: v==='t8', isT9: v==='t9', isT10: v==='t10', isT11: v==='t11', isT12: v==='t12',\n      menu, cards,\n      goHome: () => this.nav('home'),\n      crumb: cur ? cur.title : 'Início',\n      prevShow: !!prev, prevLabel: prev ? prev.title : '', prevGo: prev ? () => this.nav(prev.id) : () => {},\n      nextShow: !!next, nextLabel: next ? next.title : '', nextGo: next ? () => this.nav(next.id) : () => {},\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>

  <script>
  // Botão "Voltar ao sistema" — persiste após o bundler substituir o <html>
  (function(){
    var BTN_ID = '__voltar_sistema_btn';
    function criarBotao(){
      if (document.getElementById(BTN_ID)) return;
      var a = document.createElement('a');
      a.id = BTN_ID;
      a.href = 'index.html';
      a.textContent = '← Voltar ao sistema';
      a.setAttribute('style', [
        'position:fixed','top:13px','right:34px','z-index:2147483647',
        'display:inline-flex','align-items:center','gap:6px',
        "font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif",
        'font-size:13px','font-weight:700','letter-spacing:.2px',
        'color:#fff','background:#E8002D','text-decoration:none',
        'padding:9px 15px','border-radius:9px',
        'box-shadow:0 4px 14px rgba(232,0,45,.35)',
        'cursor:pointer','transition:background .15s,transform .15s'
      ].join(';'));
      a.onmouseenter = function(){ a.style.background='#c40026'; a.style.transform='translateY(-1px)'; };
      a.onmouseleave = function(){ a.style.background='#E8002D'; a.style.transform='none'; };
      (document.body || document.documentElement).appendChild(a);
    }
    // cria assim que possível e reinsere após o bundler trocar o documento
    function garantir(){ criarBotao(); }
    if (document.body) garantir();
    document.addEventListener('DOMContentLoaded', garantir);
    // o bundler faz replaceWith no <html>; observamos e reinserimos
    var obs = new MutationObserver(function(){ criarBotao(); });
    try { obs.observe(document.documentElement, {childList:true, subtree:true}); } catch(e){}
    // rede de segurança: algumas tentativas ao longo do carregamento
    [300, 800, 1500, 2500].forEach(function(t){ setTimeout(criarBotao, t); });
  })();
  </script>
