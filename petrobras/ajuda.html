  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ crumb }}<\u002Fspan>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <sc-if value=\"{{ isTutorial }}\" hint-placeholder-val=\"{{ false }}\">\n        <button onclick=\"{{ goHome }}\" style=\"flex-shrink:0;background:transparent;border:1px solid #DDD9D0;color:#1A1A1A;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:600;padding:7px 14px;border-radius:8px;cursor:pointer\" style-hover=\"background:#F2F1ED\">← Todos os tutoriais<\u002Fbutton>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <div style=\"flex:1;padding:36px 34px 60px\" key=\"{{ view }}\">\n\n      <!-- ══════ HOME ══════ -->\n      <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"max-width:960px;margin:0 auto;animation:caFade .4s ease both\">\n          <!-- hero -->\n          <div style=\"background:linear-gradient(120deg,#0D0D0D 0%,#1a1a1a 60%,#3a0a12 100%);border-radius:18px;padding:38px 40px;color:#fff;position:relative;overflow:hidden;margin-bottom:34px\">\n            <div style=\"position:absolute;right:-40px;top:-40px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(232,0,45,.35),transparent 70%)\"><\u002Fdiv>\n            <div style=\"position:relative\">\n              <div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#ff8fa3;font-weight:700;margin-bottom:12px\">Bem-vindo(a) 👋<\u002Fdiv>\n              <h1 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:32px;font-weight:800;line-height:1.15;margin:0 0 12px;max-width:640px\">Aprenda a usar o Sistema de Projetos passo a passo<\u002Fh1>\n              <p style=\"font-size:15px;line-height:1.6;color:rgba(255,255,255,.72);max-width:600px;margin:0\">Tutoriais rápidos e visuais para você criar projetos, acompanhar homologações e usar todos os recursos do sistema — sem complicação.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#8a877e;margin-bottom:16px\">Escolha um tutorial<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px\">\n            <sc-for list=\"{{ cards }}\" as=\"c\" hint-placeholder-count=\"7\">\n              <div onclick=\"{{ c.onClick }}\" style=\"background:#fff;border:1px solid #E2E0DA;border-radius:14px;padding:22px;cursor:pointer;transition:transform .16s,box-shadow .16s,border-color .16s;display:flex;flex-direction:column;gap:12px\" style-hover=\"transform:translateY(-3px);box-shadow:0 12px 28px rgba(0,0,0,.09);border-color:#E8002D\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between\">\n                  <div style=\"width:46px;height:46px;border-radius:12px;background:{{ c.iconBg }};display:flex;align-items:center;justify-content:center;font-size:22px\">{{ c.icon }}<\u002Fdiv>\n                  <div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:26px;font-weight:800;color:#EDEBE4\">{{ c.num }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div>\n                  <div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:16.5px;font-weight:700;line-height:1.25;margin-bottom:6px\">{{ c.title }}<\u002Fdiv>\n                  <div style=\"font-size:13px;line-height:1.55;color:#6B6860\">{{ c.desc }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"margin-top:auto;display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:#E8002D\">Ver tutorial <span>→<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:32px;background:#EFF4FF;border:1px solid #cfe0ff;border-radius:14px;padding:20px 24px;display:flex;gap:14px;align-items:flex-start\">\n            <span style=\"font-size:22px\">💡<\u002Fspan>\n            <div>\n              <div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:14.5px;margin-bottom:4px;color:#003DA5\">Novo por aqui?<\u002Fdiv>\n              <div style=\"font-size:13.5px;line-height:1.6;color:#37455f\">Comece pelo tutorial <strong>“Criar um novo projeto”<\u002Fstrong>. Depois, entenda o <strong>quadro Kanban<\u002Fstrong> — é onde o dia a dia acontece.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ══════ TUTORIAL 1 ══════ -->\n      <sc-if value=\"{{ isT1 }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"max-width:840px;margin:0 auto;animation:caFade .4s ease both\">\n          <div style=\"display:inline-block;background:#FEE2E2;color:#991B1B;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 11px;border-radius:6px;margin-bottom:14px\">Primeiros passos<\u002Fdiv>\n          <h1 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:30px;font-weight:800;line-height:1.15;margin:0 0 12px\">Como criar um novo projeto<\u002Fh1>\n          <p style=\"font-size:15px;line-height:1.65;color:#4A4741;margin:0 0 34px;max-width:680px\">Todo curso EAD começa como um <strong>card de projeto<\u002Fstrong>. Preencha 3 abas simples — Dados Gerais, Datas e Equipe — e o projeto entra no quadro Kanban pronto para produção.<\u002Fp>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:30px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#E8002D;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">1<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Clique em “＋ Novo Projeto”<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 14px\">O botão vermelho fica no topo do menu lateral, à esquerda. Ele abre a janela de cadastro.<\u002Fp>\n              <div style=\"border:1px solid #E2E0DA;border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.05);max-width:260px\">\n                <div style=\"height:30px;background:#0D0D0D;display:flex;align-items:center;gap:5px;padding:0 12px\"><span style=\"width:8px;height:8px;border-radius:50%;background:#ff5f57\"><\u002Fspan><span style=\"width:8px;height:8px;border-radius:50%;background:#febc2e\"><\u002Fspan><span style=\"width:8px;height:8px;border-radius:50%;background:#28c840\"><\u002Fspan><\u002Fdiv>\n                <div style=\"background:#0D0D0D;padding:14px\">\n                  <div style=\"background:#E8002D;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;padding:10px 13px;border-radius:8px;display:flex;align-items:center;gap:7px;box-shadow:0 0 0 3px rgba(232,0,45,.3)\"><span style=\"font-size:16px\">＋<\u002Fspan> Novo Projeto<\u002Fdiv>\n                  <div style=\"color:rgba(255,255,255,.4);font-size:12px;padding:9px 13px 2px\">▦ Quadro Kanban<\u002Fdiv>\n                  <div style=\"color:rgba(255,255,255,.4);font-size:12px;padding:5px 13px\">🔖 Homologações<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:30px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#E8002D;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">2<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Aba “📁 Dados Gerais”<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 14px\">Informe o <strong>Nome do Projeto / Curso<\u002Fstrong> (campo obrigatório, marcado com <span style=\"color:#E8002D\">*<\u002Fspan>). Depois defina Prioridade, RP, Academia e ID do Curso, marque os <strong>Recursos<\u002Fstrong> envolvidos e, se quiser, adicione o Link BDOC e uma Descrição.<\u002Fp>\n              <div style=\"border:1px solid #E2E0DA;border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.05);background:#fff\">\n                <div style=\"height:30px;background:#0D0D0D;display:flex;align-items:center;gap:5px;padding:0 12px\"><span style=\"width:8px;height:8px;border-radius:50%;background:#ff5f57\"><\u002Fspan><span style=\"width:8px;height:8px;border-radius:50%;background:#febc2e\"><\u002Fspan><span style=\"width:8px;height:8px;border-radius:50%;background:#28c840\"><\u002Fspan><span style=\"color:rgba(255,255,255,.5);font-size:11px;margin-left:8px;font-family:'Plus Jakarta Sans',sans-serif\">Novo Projeto EAD<\u002Fspan><\u002Fdiv>\n                <div style=\"padding:18px 20px;background:#fff\">\n                  <div style=\"display:flex;gap:20px;border-bottom:1px solid #E2E0DA;margin-bottom:16px\">\n                    <div style=\"font-size:12.5px;font-weight:700;color:#E8002D;padding-bottom:9px;border-bottom:2px solid #E8002D;margin-bottom:-1px\">📁 Dados Gerais<\u002Fdiv>\n                    <div style=\"font-size:12.5px;color:#9a988f;padding-bottom:9px\">🗓️ Datas &amp; Prazos<\u002Fdiv>\n                    <div style=\"font-size:12.5px;color:#9a988f;padding-bottom:9px\">👥 Equipe &amp; Etapas<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"font-size:11px;font-weight:600;color:#6B6860;margin-bottom:5px\">Nome do Projeto / Curso <span style=\"color:#E8002D\">*<\u002Fspan><\u002Fdiv>\n                  <div style=\"border:1.5px solid #E8002D;border-radius:7px;padding:9px 12px;font-size:13px;color:#1A1A1A;margin-bottom:14px;box-shadow:0 0 0 3px rgba(232,0,45,.1)\">Segurança do Trabalho — Módulo 3<\u002Fdiv>\n                  <div style=\"font-size:11px;font-weight:600;color:#6B6860;margin-bottom:6px\">Recursos<\u002Fdiv>\n                  <div style=\"display:flex;flex-wrap:wrap;gap:6px\">\n                    <span style=\"background:#003DA5;color:#fff;font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:20px\">✓ Web Rise Básico<\u002Fspan>\n                    <span style=\"background:#EEEDE8;color:#6B6860;font-size:11.5px;padding:5px 11px;border-radius:20px;border:1px solid #DDD9D0\">Web Storyline<\u002Fspan>\n                    <span style=\"background:#EEEDE8;color:#6B6860;font-size:11.5px;padding:5px 11px;border-radius:20px;border:1px solid #DDD9D0\">Encapsulamento<\u002Fspan>\n                    <span style=\"background:#EEEDE8;color:#6B6860;font-size:11.5px;padding:5px 11px;border-radius:20px;border:1px solid #DDD9D0\">Autoria Digital<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:30px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#E8002D;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">3<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Aba “🗓️ Datas &amp; Prazos”<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 14px\">Escolha a <strong>Coluna Inicial<\u002Fstrong> (onde o card vai nascer no Kanban) e informe as datas de Criação, Início e o <strong>Prazo de Entrega<\u002Fstrong>. Há espaço para uma observação sobre o prazo, se precisar.<\u002Fp>\n              <div style=\"border:1px solid #E2E0DA;border-radius:12px;background:#fff;padding:18px 20px;box-shadow:0 4px 16px rgba(0,0,0,.05);display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n                <div>\n                  <div style=\"font-size:11px;font-weight:600;color:#6B6860;margin-bottom:5px\">Coluna Inicial<\u002Fdiv>\n                  <div style=\"border:1px solid #DDD9D0;border-radius:7px;padding:9px 12px;font-size:13px;display:flex;justify-content:space-between;color:#1A1A1A\">Aguardando Reunião Inicial <span style=\"color:#9a988f\">▾<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n                <div>\n                  <div style=\"font-size:11px;font-weight:600;color:#6B6860;margin-bottom:5px\">Prazo de Entrega<\u002Fdiv>\n                  <div style=\"display:flex;gap:6px\">\n                    <div style=\"flex:1;border:1px solid #DDD9D0;border-radius:7px;padding:9px 0;font-size:13px;text-align:center;color:#1A1A1A\">15<\u002Fdiv>\n                    <div style=\"flex:1;border:1px solid #DDD9D0;border-radius:7px;padding:9px 0;font-size:13px;text-align:center;color:#1A1A1A\">08<\u002Fdiv>\n                    <div style=\"flex:1.3;border:1px solid #DDD9D0;border-radius:7px;padding:9px 0;font-size:13px;text-align:center;color:#1A1A1A\">2026<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:30px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#E8002D;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">4<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Aba “👥 Equipe &amp; Etapas”<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 14px\">Selecione um ou mais <strong>Responsáveis<\u002Fstrong> pelo projeto. Abaixo, o sistema já traz a lista de <strong>etapas padrão<\u002Fstrong> do fluxo — você pode conferir e ajustar prazos de cada etapa.<\u002Fp>\n              <div style=\"border:1px solid #E2E0DA;border-radius:12px;background:#fff;padding:18px 20px;box-shadow:0 4px 16px rgba(0,0,0,.05)\">\n                <div style=\"font-size:11px;font-weight:600;color:#6B6860;margin-bottom:7px\">Responsável(is) — selecione um ou mais<\u002Fdiv>\n                <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px\">\n                  <span style=\"background:#003DA5;color:#fff;font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:20px;display:flex;align-items:center;gap:5px\"><span style=\"width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,.25);display:inline-flex;align-items:center;justify-content:center;font-size:8px\">MA<\u002Fspan> Mariana<\u002Fspan>\n                  <span style=\"background:#EEEDE8;color:#6B6860;font-size:11.5px;padding:5px 11px;border-radius:20px;border:1px solid #DDD9D0\">Thiago<\u002Fspan>\n                  <span style=\"background:#EEEDE8;color:#6B6860;font-size:11.5px;padding:5px 11px;border-radius:20px;border:1px solid #DDD9D0\">Simone<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"border-top:1px solid #EEEDE8;padding-top:12px\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;font-size:12.5px;padding:7px 0;border-bottom:1px solid #F2F1ED\"><span>1. Reunião Inicial<\u002Fspan><span style=\"color:#9a988f;font-size:11px\">Cliente<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;font-size:12.5px;padding:7px 0;border-bottom:1px solid #F2F1ED\"><span>2. Elaboração do PI<\u002Fspan><span style=\"color:#9a988f;font-size:11px\">Equipe<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;font-size:12.5px;padding:7px 0\"><span style=\"color:#9a988f\">…demais etapas do fluxo<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:20px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#1A8A4A;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">5<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Clique em “Salvar”<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 14px\">Pronto! O projeto aparece no <strong>Kanban<\u002Fstrong> na coluna que você escolheu. Uma mensagem verde confirma que deu tudo certo.<\u002Fp>\n              <div style=\"display:inline-flex;align-items:center;gap:9px;background:#0D0D0D;color:#fff;font-size:13px;font-weight:600;padding:11px 18px;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,.18)\"><span style=\"font-size:16px\">✅<\u002Fspan> Projeto salvo com sucesso<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:11px;padding:15px 17px;background:#FFF7ED;border:1px solid #FED7AA;border-radius:12px\">\n            <span style=\"font-size:18px\">💡<\u002Fspan>\n            <div style=\"font-size:13.5px;line-height:1.6;color:#7C2D12\"><strong>Dica:<\u002Fstrong> só o campo <strong>Nome do Projeto / Curso<\u002Fstrong> é obrigatório. Todo o resto pode ser preenchido depois, editando o projeto a qualquer momento.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ══════ TUTORIAL 3 — KANBAN ══════ -->\n      <sc-if value=\"{{ isT3 }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"max-width:840px;margin:0 auto;animation:caFade .4s ease both\">\n          <div style=\"display:inline-block;background:#EFF4FF;color:#003DA5;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 11px;border-radius:6px;margin-bottom:14px\">No dia a dia<\u002Fdiv>\n          <h1 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:30px;font-weight:800;line-height:1.15;margin:0 0 12px\">Como usar o quadro Kanban<\u002Fh1>\n          <p style=\"font-size:15px;line-height:1.65;color:#4A4741;margin:0 0 34px;max-width:680px\">O <strong>Kanban<\u002Fstrong> é a tela principal. Cada projeto é um card que caminha por colunas — da <em>Reunião Inicial<\u002Fem> até <em>Projetos Concluídos<\u002Fem>. É onde você acompanha e movimenta a produção.<\u002Fp>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:30px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#003DA5;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">1<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Entenda as colunas<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 14px\">Cada coluna é uma <strong>etapa do fluxo de produção<\u002Fstrong>. Os cards ficam na coluna que representa o momento atual do projeto.<\u002Fp>\n              <div style=\"border:1px solid #E2E0DA;border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.05)\">\n                <div style=\"height:30px;background:#0D0D0D;display:flex;align-items:center;gap:5px;padding:0 12px\"><span style=\"width:8px;height:8px;border-radius:50%;background:#ff5f57\"><\u002Fspan><span style=\"width:8px;height:8px;border-radius:50%;background:#febc2e\"><\u002Fspan><span style=\"width:8px;height:8px;border-radius:50%;background:#28c840\"><\u002Fspan><\u002Fdiv>\n                <div style=\"background:#F2F1ED;padding:16px;display:flex;gap:12px;overflow-x:auto\">\n                  <div style=\"flex-shrink:0;width:150px\">\n                    <div style=\"display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:#1A1A1A;margin-bottom:9px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#8B5CF6\"><\u002Fspan>Projeto Instrucional<\u002Fdiv>\n                    <div style=\"background:#fff;border:1px solid #E2E0DA;border-radius:9px;padding:11px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.04)\"><div style=\"font-size:12px;font-weight:600;margin-bottom:6px\">Ética e Compliance<\u002Fdiv><span style=\"background:#E0F2FE;color:#075985;font-size:9px;font-weight:600;padding:1px 6px;border-radius:4px\">WEB RISE<\u002Fspan><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"flex-shrink:0;width:150px\">\n                    <div style=\"display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:#1A1A1A;margin-bottom:9px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#003DA5\"><\u002Fspan>Desenvolvimento<\u002Fdiv>\n                    <div style=\"background:#fff;border:1px solid #E2E0DA;border-radius:9px;padding:11px;box-shadow:0 6px 16px rgba(0,61,165,.14);transform:rotate(-2deg)\"><div style=\"font-size:12px;font-weight:600;margin-bottom:6px\">Segurança Módulo 3<\u002Fdiv><span style=\"background:#FEE2E2;color:#991B1B;font-size:9px;font-weight:600;padding:1px 6px;border-radius:4px\">🔴 URGENTE<\u002Fspan><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"flex-shrink:0;width:150px\">\n                    <div style=\"display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:#1A1A1A;margin-bottom:9px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#0891B2\"><\u002Fspan>Validação<\u002Fdiv>\n                    <div style=\"background:#fff;border:1px dashed #cfd4dc;border-radius:9px;padding:11px;color:#b8b6ad;font-size:11px;text-align:center\">arraste um card aqui<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:30px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#003DA5;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">2<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Arraste para mover de coluna<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 4px\">Clique e <strong>segure um card<\u002Fstrong>, arraste até a coluna desejada e solte. O sistema atualiza a posição e mostra uma confirmação. É a forma mais rápida de mover um projeto manualmente.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:30px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#003DA5;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">3<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Conclua etapas dentro do card<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 14px\">Clique em um card para abrir os <strong>detalhes<\u002Fstrong>. Lá você marca cada etapa como <strong>concluída<\u002Fstrong>. Ao concluir etapas, o card <strong>avança de coluna sozinho<\u002Fstrong> — você não precisa arrastar.<\u002Fp>\n              <div style=\"border:1px solid #E2E0DA;border-radius:12px;background:#fff;padding:18px 20px;box-shadow:0 4px 16px rgba(0,0,0,.05)\">\n                <div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;margin-bottom:12px\">Segurança do Trabalho — Módulo 3<\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #F2F1ED\"><span style=\"width:20px;height:20px;border-radius:6px;background:#1A8A4A;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px\">✓<\u002Fspan><span style=\"font-size:13px;color:#9a988f;text-decoration:line-through\">Reunião Inicial<\u002Fspan><span style=\"margin-left:auto;font-size:11px;background:#DCFCE7;color:#15803D;padding:2px 8px;border-radius:20px;font-weight:600\">Concluída<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #F2F1ED\"><span style=\"width:20px;height:20px;border-radius:6px;background:#1A8A4A;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px\">✓<\u002Fspan><span style=\"font-size:13px;color:#9a988f;text-decoration:line-through\">Elaboração do PI<\u002Fspan><span style=\"margin-left:auto;font-size:11px;background:#DCFCE7;color:#15803D;padding:2px 8px;border-radius:20px;font-weight:600\">Concluída<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:10px;padding:9px 0\"><span style=\"width:20px;height:20px;border-radius:6px;border:2px solid #cfd4dc;display:inline-block\"><\u002Fspan><span style=\"font-size:13px;font-weight:600\">Revisão do PI<\u002Fspan><span style=\"margin-left:auto;font-size:11px;background:#FEF3C7;color:#92400E;padding:2px 8px;border-radius:20px;font-weight:600\">Em andamento<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:20px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#003DA5;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">4<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Registre atrasos quando aparecerem<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 4px\">Se você concluir uma etapa <strong>depois do prazo<\u002Fstrong>, o sistema pede o <strong>motivo do atraso<\u002Fstrong>. Descreva o que aconteceu (ou clique em “Pular”). Isso alimenta os relatórios de atraso.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:11px;padding:15px 17px;background:#EFF4FF;border:1px solid #cfe0ff;border-radius:12px\">\n            <span style=\"font-size:18px\">💡<\u002Fspan>\n            <div style=\"font-size:13.5px;line-height:1.6;color:#37455f\"><strong>Dica:<\u002Fstrong> cada card mostra os <strong>recursos<\u002Fstrong>, a <strong>prioridade<\u002Fstrong> e os <strong>responsáveis<\u002Fstrong> num relance. Use as cores das etiquetas para achar rápido o que importa.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ══════ TUTORIAL 2 — HOMOLOGAÇÕES ══════ -->\n      <sc-if value=\"{{ isT2 }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"max-width:840px;margin:0 auto;animation:caFade .4s ease both\">\n          <div style=\"display:inline-block;background:#FEF3C7;color:#92400E;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 11px;border-radius:6px;margin-bottom:14px\">No dia a dia<\u002Fdiv>\n          <h1 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:30px;font-weight:800;line-height:1.15;margin:0 0 12px\">Como verificar as homologações<\u002Fh1>\n          <p style=\"font-size:15px;line-height:1.65;color:#4A4741;margin:0 0 30px;max-width:680px\">A tela <strong>Homologações<\u002Fstrong> reúne os projetos que chegaram à etapa de <em>Homologação / Instalação<\u002Fem>. Cada card passa por 4 status — e você avança preenchendo <strong>3 datas<\u002Fstrong>.<\u002Fp>\n\n          <div style=\"display:flex;gap:10px;flex-wrap:wrap;margin-bottom:32px\">\n            <div style=\"display:flex;align-items:center;gap:7px;background:#FEE2E2;color:#991B1B;font-size:12.5px;font-weight:600;padding:8px 13px;border-radius:9px\">⏳ Pendente<\u002Fdiv>\n            <span style=\"align-self:center;color:#c9c6bf\">→<\u002Fspan>\n            <div style=\"display:flex;align-items:center;gap:7px;background:#FEF3C7;color:#92400E;font-size:12.5px;font-weight:600;padding:8px 13px;border-radius:9px\">🔖 Homologado<\u002Fdiv>\n            <span style=\"align-self:center;color:#c9c6bf\">→<\u002Fspan>\n            <div style=\"display:flex;align-items:center;gap:7px;background:#EFF6FF;color:#1D4ED8;font-size:12.5px;font-weight:600;padding:8px 13px;border-radius:9px\">✅ Autorizado<\u002Fdiv>\n            <span style=\"align-self:center;color:#c9c6bf\">→<\u002Fspan>\n            <div style=\"display:flex;align-items:center;gap:7px;background:#DCFCE7;color:#15803D;font-size:12.5px;font-weight:600;padding:8px 13px;border-radius:9px\">🖥️ Instalado<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:30px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#D97706;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">1<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Abra “Homologações” no menu<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 14px\">No topo aparecem 3 indicadores: quantos projetos estão <strong>Pendentes<\u002Fstrong>, <strong>Homologados<\u002Fstrong> e <strong>Autorizados / Instalados<\u002Fstrong>. Abaixo, os cards ficam agrupados por status, com cores diferentes.<\u002Fp>\n              <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:12px\">\n                <div style=\"background:#fff;border:1px solid #E2E0DA;border-left:4px solid #E8002D;border-radius:10px;padding:14px\"><div style=\"font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:#6B6860\">⏳ Pendentes<\u002Fdiv><div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:26px;font-weight:800\">4<\u002Fdiv><div style=\"font-size:10px;color:#9a988f\">sem data de homologação<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid #E2E0DA;border-left:4px solid #D97706;border-radius:10px;padding:14px\"><div style=\"font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:#6B6860\">🔖 Homologados<\u002Fdiv><div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:26px;font-weight:800\">2<\u002Fdiv><div style=\"font-size:10px;color:#9a988f\">aguardando autorização<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid #E2E0DA;border-left:4px solid #1A8A4A;border-radius:10px;padding:14px\"><div style=\"font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:#6B6860\">🖥️ Instalados<\u002Fdiv><div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:26px;font-weight:800\">7<\u002Fdiv><div style=\"font-size:10px;color:#9a988f\">concluídos no SIRH<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:30px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#D97706;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">2<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Clique num card para expandir e preencher<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 14px\">O card abre com os campos: <strong>ID do Curso<\u002Fstrong>, <strong>Pacote SCORM<\u002Fstrong>, <strong>Nº de Páginas</u002Fstrong>, <strong>Solicitou a Homologação<\u002Fstrong>, <strong>Homologado Por<\u002Fstrong>, RT, Conclusão, Nota de Corte, Novo/Manutenção e Serviço.<\u002Fp>\n              <div style=\"border:1px solid #E2E0DA;border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.05);background:#fff\">\n                <div style=\"background:linear-gradient(135deg,#B45309,#F59E0B);padding:13px 16px;color:#fff;display:flex;align-items:center;justify-content:space-between\"><span style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:13.5px\">Ética e Compliance — Turma 2<\u002Fspan><span style=\"background:rgba(255,255,255,.22);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px\">🔖 Homologado<\u002Fspan><\u002Fdiv>\n                <div style=\"padding:16px 18px\">\n                  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px 18px\">\n                    <div><div style=\"font-size:10.5px;font-weight:600;color:#6B6860;margin-bottom:4px\">ID do Curso<\u002Fdiv><div style=\"border:1px solid #DDD9D0;border-radius:6px;padding:7px 10px;font-size:12.5px\">12345<\u002Fdiv><\u002Fdiv>\n                    <div><div style=\"font-size:10.5px;font-weight:600;color:#6B6860;margin-bottom:4px\">Pacote SCORM<\u002Fdiv><div style=\"border:1px solid #DDD9D0;border-radius:6px;padding:7px 10px;font-size:12.5px\">etica_v1.zip<\u002Fdiv><\u002Fdiv>\n                    <div><div style=\"font-size:10.5px;font-weight:600;color:#6B6860;margin-bottom:4px\">Solicitou a Homologação<\u002Fdiv><div style=\"border:1px solid #DDD9D0;border-radius:6px;padding:7px 10px;font-size:12.5px;display:flex;justify-content:space-between\">Mariana <span style=\"color:#9a988f\">▾<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                    <div><div style=\"font-size:10.5px;font-weight:600;color:#6B6860;margin-bottom:4px\">Homologado Por<\u002Fdiv><div style=\"border:1px solid #DDD9D0;border-radius:6px;padding:7px 10px;font-size:12.5px;display:flex;justify-content:space-between\">Thiago <span style=\"color:#9a988f\">▾<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:30px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#D97706;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">3<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Preencha as datas — nesta ordem<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 14px\">É o preenchimento das datas que <strong>muda o status<\u002Fstrong> do card. Siga a sequência:<\u002Fp>\n              <div style=\"border:1px solid #E2E0DA;border-radius:12px;background:#fff;padding:16px 18px;box-shadow:0 4px 16px rgba(0,0,0,.05);display:grid;grid-template-columns:repeat(3,1fr);gap:12px\">\n                <div style=\"background:#FFFBEB;border:1px solid #FDE68A;border-radius:9px;padding:12px\"><div style=\"font-size:11px;font-weight:700;color:#92400E;margin-bottom:6px\">📅 Homologação<\u002Fdiv><div style=\"font-size:12.5px;color:#1A1A1A\">12/06/2026<\u002Fdiv><div style=\"font-size:10px;color:#b08a3e;margin-top:4px\">→ vira 🔖 Homologado<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#EFF6FF;border:1px solid #bfd7fe;border-radius:9px;padding:12px\"><div style=\"font-size:11px;font-weight:700;color:#1D4ED8;margin-bottom:6px\">✅ Autorização<\u002Fdiv><div style=\"font-size:12.5px;color:#1A1A1A\">18/06/2026<\u002Fdiv><div style=\"font-size:10px;color:#5b82c9;margin-top:4px\">→ vira ✅ Autorizado<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#F0FDF4;border:1px solid #bbf7d0;border-radius:9px;padding:12px\"><div style=\"font-size:11px;font-weight:700;color:#15803D;margin-bottom:6px\">🖥️ Instalação SIRH<\u002Fdiv><div style=\"font-size:12.5px;color:#9a988f\">— — —<\u002Fdiv><div style=\"font-size:10px;color:#5fa77c;margin-top:4px\">→ conclui o projeto<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:30px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#1A8A4A;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">4<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Clique em “💾 Salvar”<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0\">Os dados ficam guardados e o card muda de grupo automaticamente. Você pode voltar e editar quando quiser.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:20px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#D97706;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">5<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Use os filtros para encontrar projetos<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 12px\">No alto da tela, filtre por <strong>Solicitante<\u002Fstrong>, <strong>Homologado Por<\u002Fstrong> ou período de <strong>Medição<\u002Fstrong>.<\u002Fp>\n              <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n                <span style=\"border:1px solid #DDD9D0;background:#fff;border-radius:8px;padding:7px 12px;font-size:12px;color:#4A4741\">👤 Solicitante ▾<\u002Fspan>\n                <span style=\"border:1px solid #DDD9D0;background:#fff;border-radius:8px;padding:7px 12px;font-size:12px;color:#4A4741\">📤 Homologado Por ▾<\u002Fspan>\n                <span style=\"border:1px solid #DDD9D0;background:#fff;border-radius:8px;padding:7px 12px;font-size:12px;color:#4A4741\">📅 Medição ▾<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:11px;padding:15px 17px;background:#F0FDF4;border:1px solid #bbf7d0;border-radius:12px\">\n            <span style=\"font-size:18px\">💡<\u002Fspan>\n            <div style=\"font-size:13.5px;line-height:1.6;color:#166534\"><strong>Dica:<\u002Fstrong> ao preencher a data de <strong>Instalação SIRH<\u002Fstrong>, o projeto é dado como concluído e segue automaticamente para a tela de <strong>Medição<\u002Fstrong>.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ══════ TUTORIAL 4 — EDITAR ══════ -->\n      <sc-if value=\"{{ isT4 }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"max-width:840px;margin:0 auto;animation:caFade .4s ease both\">\n          <div style=\"display:inline-block;background:#F3E8FF;color:#6B21A8;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 11px;border-radius:6px;margin-bottom:14px\">No dia a dia<\u002Fdiv>\n          <h1 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:30px;font-weight:800;line-height:1.15;margin:0 0 12px\">Como editar e atualizar um projeto<\u002Fh1>\n          <p style=\"font-size:15px;line-height:1.65;color:#4A4741;margin:0 0 34px;max-width:680px\">Precisou mudar um prazo, trocar o responsável ou corrigir um dado? Qualquer informação do projeto pode ser alterada a qualquer momento — e o sistema guarda o registro da edição.<\u002Fp>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:30px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#7C3AED;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">1<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Abra o projeto<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0\">Clique no <strong>card<\u002Fstrong> (no Kanban) ou na <strong>linha<\u002Fstrong> (na Lista de Projetos). Isso abre o painel de detalhes do projeto.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:30px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#7C3AED;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">2<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Clique em “Editar”<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 14px\">No painel de detalhes, o botão <strong>Editar<\u002Fstrong> abre a mesma janela do cadastro, com as 3 abas já preenchidas.<\u002Fp>\n              <div style=\"border:1px solid #E2E0DA;border-radius:12px;background:#fff;padding:16px 18px;box-shadow:0 4px 16px rgba(0,0,0,.05);display:flex;align-items:center;justify-content:space-between\">\n                <div><div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700\">Segurança do Trabalho — Módulo 3<\u002Fdiv><div style=\"font-size:11.5px;color:#9a988f;margin-top:2px\">Coluna: Desenvolvimento · 🔴 Urgente<\u002Fdiv><\u002Fdiv>\n                <div style=\"display:flex;gap:8px\"><span style=\"background:#003DA5;color:#fff;font-size:12px;font-weight:600;padding:7px 15px;border-radius:8px\">✏️ Editar<\u002Fspan><span style=\"border:1px solid #DDD9D0;color:#6B6860;font-size:12px;padding:7px 12px;border-radius:8px\">Fechar<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:30px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#7C3AED;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">3<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Altere o que precisar e salve<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0\">Navegue pelas abas <strong>Dados Gerais<\u002Fstrong>, <strong>Datas &amp; Prazos<\u002Fstrong> e <strong>Equipe &amp; Etapas<\u002Fstrong>, faça as mudanças e clique em <strong>Salvar<\u002Fstrong>. Você também pode, direto no painel de detalhes, <strong>marcar etapas como concluídas<\u002Fstrong> e <strong>ajustar o prazo de cada etapa<\u002Fstrong> sem abrir a edição completa.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:11px;padding:15px 17px;background:#F5F3FF;border:1px solid #ddd6fe;border-radius:12px\">\n            <span style=\"font-size:18px\">💡<\u002Fspan>\n            <div style=\"font-size:13.5px;line-height:1.6;color:#5b21b6\"><strong>Dica:<\u002Fstrong> toda criação e edição fica registrada em <strong>Histórico de Edições<\u002Fstrong>. Assim dá pra saber quem alterou o quê e quando. Excluir projetos, porém, é permitido apenas a quem tem <strong>“Liderança”<\u002Fstrong> no nome.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ══════ TUTORIAL 5 — KPIs ══════ -->\n      <sc-if value=\"{{ isT5 }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"max-width:840px;margin:0 auto;animation:caFade .4s ease both\">\n          <div style=\"display:inline-block;background:#DCFCE7;color:#15803D;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 11px;border-radius:6px;margin-bottom:14px\">Acompanhamento<\u002Fdiv>\n          <h1 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:30px;font-weight:800;line-height:1.15;margin:0 0 34px\">Como ler os KPIs e indicadores<\u002Fh1>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:30px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#1A8A4A;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">1<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Escolha o período<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 14px\">No topo do dashboard, selecione a janela de tempo. Todos os números da tela se ajustam ao período escolhido.<\u002Fp>\n              <div style=\"display:inline-flex;gap:4px;background:#EEEDE8;padding:4px;border-radius:9px\">\n                <span style=\"background:#0D0D0D;color:#fff;font-size:12px;font-weight:600;padding:6px 13px;border-radius:6px\">Todos<\u002Fspan>\n                <span style=\"color:#6B6860;font-size:12px;padding:6px 13px\">30d<\u002Fspan>\n                <span style=\"color:#6B6860;font-size:12px;padding:6px 13px\">60d<\u002Fspan>\n                <span style=\"color:#6B6860;font-size:12px;padding:6px 13px\">90d<\u002Fspan>\n                <span style=\"color:#6B6860;font-size:12px;padding:6px 13px\">6m<\u002Fspan>\n                <span style=\"color:#6B6860;font-size:12px;padding:6px 13px\">1a<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:30px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#1A8A4A;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">2<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Navegue pelas 4 abas<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 14px\">Cada aba responde a uma pergunta diferente sobre a produção:<\u002Fp>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">\n                <div style=\"background:#fff;border:1px solid #E2E0DA;border-radius:10px;padding:13px 15px\"><div style=\"font-weight:700;font-size:13px;margin-bottom:3px\">📈 Visão Geral<\u002Fdiv><div style=\"font-size:12px;color:#6B6860;line-height:1.5\">Resumo, distribuição por situação e insights rápidos.<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid #E2E0DA;border-radius:10px;padding:13px 15px\"><div style=\"font-weight:700;font-size:13px;margin-bottom:3px\">👥 Pessoas &amp; Academias<\u002Fdiv><div style=\"font-size:12px;color:#6B6860;line-height:1.5\">Desempenho por pessoa e por academia.<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid #E2E0DA;border-radius:10px;padding:13px 15px\"><div style=\"font-weight:700;font-size:13px;margin-bottom:3px\">🔄 Fluxo &amp; Entregas<\u002Fdiv><div style=\"font-size:12px;color:#6B6860;line-height:1.5\">Movimento entre colunas e entregas por mês.<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid #E2E0DA;border-radius:10px;padding:13px 15px\"><div style=\"font-weight:700;font-size:13px;margin-bottom:3px\">⏱️ Tempos &amp; Eficiência<\u002Fdiv><div style=\"font-size:12px;color:#6B6860;line-height:1.5\">Tempo médio de etapas e do ciclo total.<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:20px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#1A8A4A;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">3<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Leia os cartões principais<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 14px\">Comece pelos números grandes da <strong>Visão Geral<\u002Fstrong>. Eles dão o panorama antes de você entrar nos detalhes.<\u002Fp>\n              <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:12px\">\n                <div style=\"background:#fff;border:1px solid #E2E0DA;border-radius:10px;padding:15px\"><div style=\"font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:#6B6860\">Em andamento<\u002Fdiv><div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:28px;font-weight:800\">18<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid #E2E0DA;border-radius:10px;padding:15px\"><div style=\"font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:#6B6860\">Concluídos<\u002Fdiv><div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:28px;font-weight:800;color:#1A8A4A\">42<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid #E2E0DA;border-radius:10px;padding:15px\"><div style=\"font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:#6B6860\">Em atraso<\u002Fdiv><div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:28px;font-weight:800;color:#E8002D\">5<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:11px;padding:15px 17px;background:#F0FDF4;border:1px solid #bbf7d0;border-radius:12px\">\n            <span style=\"font-size:18px\">💡<\u002Fspan>\n            <div style=\"font-size:13.5px;line-height:1.6;color:#166534\"><strong>Dica:<\u002Fstrong> os KPIs são recalculados em tempo real a partir dos projetos. Mantenha as etapas e datas atualizadas no Kanban para que os números reflitam a realidade.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ══════ TUTORIAL 6 — ATRASOS ══════ -->\n      <sc-if value=\"{{ isT6 }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"max-width:840px;margin:0 auto;animation:caFade .4s ease both\">\n          <div style=\"display:inline-block;background:#FEE2E2;color:#991B1B;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 11px;border-radius:6px;margin-bottom:14px\">Acompanhamento<\u002Fdiv>\n          <h1 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:30px;font-weight:800;line-height:1.15;margin:0 0 34px\">Como acompanhar os atrasos<\u002Fh1>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:30px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#E8002D;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">1<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Abra “Relatório de Atrasos”<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 14px\">A tela lista os <strong>projetos e etapas em atraso<\u002Fstrong>. No topo, um resumo mostra quantos são e onde estão os gargalos.<\u002Fp>\n              <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:10px\">\n                <div style=\"background:#fff;border:1px solid #E2E0DA;border-radius:10px;padding:13px\"><div style=\"font-size:10px;text-transform:uppercase;color:#6B6860\">Etapas atrasadas<\u002Fdiv><div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:24px;font-weight:800;color:#E8002D\">9<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid #E2E0DA;border-radius:10px;padding:13px\"><div style=\"font-size:10px;text-transform:uppercase;color:#6B6860\">Com a equipe<\u002Fdiv><div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:24px;font-weight:800\">6<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid #E2E0DA;border-radius:10px;padding:13px\"><div style=\"font-size:10px;text-transform:uppercase;color:#6B6860\">Com o cliente<\u002Fdiv><div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:24px;font-weight:800\">3<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:30px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#E8002D;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">2<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Filtre para focar no que importa<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 14px\">Combine os filtros para responder perguntas específicas — por exemplo, “quais atrasos são responsabilidade da equipe e comprometem o prazo final?”.<\u002Fp>\n              <div style=\"display:flex;flex-direction:column;gap:8px\">\n                <div><span style=\"font-size:11px;font-weight:700;color:#6B6860;text-transform:uppercase\">Projetos em atraso<\u002Fspan> <span style=\"border:1px solid #DDD9D0;background:#fff;border-radius:8px;padding:6px 11px;font-size:12px;margin-left:6px\">👥 Equipe / 🏢 Cliente ▾<\u002Fspan><\u002Fdiv>\n                <div><span style=\"font-size:11px;font-weight:700;color:#6B6860;text-transform:uppercase\">Responsável da etapa<\u002Fspan> <span style=\"border:1px solid #DDD9D0;background:#fff;border-radius:8px;padding:6px 11px;font-size:12px;margin-left:6px\">Todos ▾<\u002Fspan><\u002Fdiv>\n                <div><span style=\"font-size:11px;font-weight:700;color:#6B6860;text-transform:uppercase\">Prazo final<\u002Fspan> <span style=\"border:1px solid #DDD9D0;background:#fff;border-radius:8px;padding:6px 11px;font-size:12px;margin-left:6px\">🔴 Comprometido / 🟡 Não comprometido ▾<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:20px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#E8002D;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">3<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Analise cada etapa atrasada<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 14px\">A lista mostra o projeto, a etapa parada, o responsável e há quantos dias está atrasada. Clique para abrir o projeto e agir.<\u002Fp>\n              <div style=\"border:1px solid #E2E0DA;border-radius:12px;background:#fff;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.05)\">\n                <div style=\"display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #F2F1ED\"><span style=\"width:9px;height:9px;border-radius:50%;background:#E8002D\"><\u002Fspan><div style=\"flex:1\"><div style=\"font-size:13px;font-weight:600\">Ética e Compliance — Turma 2<\u002Fdiv><div style=\"font-size:11.5px;color:#9a988f\">Revisão do PI · Mariana<\u002Fdiv><\u002Fdiv><span style=\"background:#FEE2E2;color:#991B1B;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px\">7 dias<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:12px;padding:12px 16px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#D97706\"><\u002Fspan><div style=\"flex:1\"><div style=\"font-size:13px;font-weight:600\">Liderança &amp; Gestão<\u002Fdiv><div style=\"font-size:11.5px;color:#9a988f\">Validação Final · Cliente<\u002Fdiv><\u002Fdiv><span style=\"background:#FEF3C7;color:#92400E;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px\">3 dias<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:11px;padding:15px 17px;background:#FEF2F2;border:1px solid #fecaca;border-radius:12px\">\n            <span style=\"font-size:18px\">💡<\u002Fspan>\n            <div style=\"font-size:13.5px;line-height:1.6;color:#991B1B\"><strong>Dica:<\u002Fstrong> atrasos <strong>“comprometidos”<\u002Fstrong> (vermelho) já afetam o prazo final de entrega — priorize-os. Os <strong>“não comprometidos”<\u002Fstrong> (amarelo) ainda têm folga no cronograma.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ══════ TUTORIAL 7 — CARGA DA EQUIPE ══════ -->\n      <sc-if value=\"{{ isT7 }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"max-width:840px;margin:0 auto;animation:caFade .4s ease both\">\n          <div style=\"display:inline-block;background:#E0F2FE;color:#075985;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 11px;border-radius:6px;margin-bottom:14px\">Acompanhamento<\u002Fdiv>\n          <h1 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:30px;font-weight:800;line-height:1.15;margin:0 0 12px\">Como ver a carga da equipe<\u002Fh1>\n          <p style=\"font-size:15px;line-height:1.65;color:#4A4741;margin:0 0 34px;max-width:680px\">Este painel mostra, para cada pessoa, os projetos cuja <strong>etapa atual está na mão dela agora<\u002Fstrong>. É a forma mais rápida de equilibrar o trabalho e saber quem está sobrecarregado.<\u002Fp>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:30px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#0891B2;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">1<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Abra “Carga da Equipe”<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 14px\">Cada pessoa aparece como um cartão com a <strong>quantidade de projetos ativos<\u002Fstrong> e a lista deles.<\u002Fp>\n              <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:12px\">\n                <div style=\"background:#fff;border:1px solid #E2E0DA;border-radius:12px;padding:15px\"><div style=\"display:flex;align-items:center;gap:9px;margin-bottom:11px\"><span style=\"width:32px;height:32px;border-radius:50%;background:#003DA5;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700\">MA<\u002Fspan><div><div style=\"font-size:13px;font-weight:700\">Mariana<\u002Fdiv><div style=\"font-size:10.5px;color:#9a988f\">3 projetos ativos<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"font-size:11px;color:#4A4741;line-height:1.7\">• Segurança M3<br>• Ética Turma 2<br>• NR-35<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid #E2E0DA;border-radius:12px;padding:15px\"><div style=\"display:flex;align-items:center;gap:9px;margin-bottom:11px\"><span style=\"width:32px;height:32px;border-radius:50%;background:#1A8A4A;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700\">TH<\u002Fspan><div><div style=\"font-size:13px;font-weight:700\">Thiago<\u002Fdiv><div style=\"font-size:10.5px;color:#9a988f\">1 projeto ativo<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"font-size:11px;color:#4A4741;line-height:1.7\">• Liderança &amp; Gestão<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid #E2E0DA;border-radius:12px;padding:15px\"><div style=\"display:flex;align-items:center;gap:9px;margin-bottom:11px\"><span style=\"width:32px;height:32px;border-radius:50%;background:#D97706;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700\">SI<\u002Fspan><div><div style=\"font-size:13px;font-weight:700\">Simone<\u002Fdiv><div style=\"font-size:10.5px;color:#E8002D;font-weight:600\">4 · ⚠️ sobrecarga<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"font-size:11px;color:#4A4741;line-height:1.7\">• 4 projetos em produção<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:20px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#0891B2;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">2<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Refine com os filtros<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 12px\">Filtre por <strong>Pessoa<\u002Fstrong>, <strong>Situação<\u002Fstrong> (⚠️ Atrasados, 🔄 Em andamento, ⏳ Aguardando), <strong>Recurso<\u002Fstrong> ou <strong>Prioridade<\u002Fstrong> para enxergar a distribuição por qualquer critério.<\u002Fp>\n              <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n                <span style=\"border:1px solid #DDD9D0;background:#fff;border-radius:8px;padding:7px 12px;font-size:12px;color:#4A4741\">Pessoa ▾<\u002Fspan>\n                <span style=\"border:1px solid #DDD9D0;background:#fff;border-radius:8px;padding:7px 12px;font-size:12px;color:#4A4741\">Situação ▾<\u002Fspan>\n                <span style=\"border:1px solid #DDD9D0;background:#fff;border-radius:8px;padding:7px 12px;font-size:12px;color:#4A4741\">Recurso ▾<\u002Fspan>\n                <span style=\"border:1px solid #DDD9D0;background:#fff;border-radius:8px;padding:7px 12px;font-size:12px;color:#4A4741\">Prioridade ▾<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:11px;padding:15px 17px;background:#ECFEFF;border:1px solid #a5f3fc;border-radius:12px\">\n            <span style=\"font-size:18px\">💡<\u002Fspan>\n            <div style=\"font-size:13.5px;line-height:1.6;color:#155e75\"><strong>Importante:<\u002Fstrong> o painel mostra só o que realmente está na mão de cada um atualmente, em tempo real.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ══════ TUTORIAL 8 — CRONOGRAMA ══════ -->\n      <sc-if value=\"{{ isT8 }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"max-width:840px;margin:0 auto;animation:caFade .4s ease both\">\n          <div style=\"display:inline-block;background:#EDE9FE;color:#5B21B6;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 11px;border-radius:6px;margin-bottom:14px\">No dia a dia<\u002Fdiv>\n          <h1 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:30px;font-weight:800;line-height:1.15;margin:0 0 12px\">Como acompanhar o cronograma<\u002Fh1>\n          <p style=\"font-size:15px;line-height:1.65;color:#4A4741;margin:0 0 34px;max-width:680px\">O <strong>Cronograma<\u002Fstrong> mostra todos os projetos em um gráfico de <strong>Gantt<\u002Fstrong>: cada linha é um projeto e cada barra representa o período dele ao longo dos meses do ano.<\u002Fp>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:30px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#7C3AED;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">1<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Escolha o ano e filtre a situação<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 14px\">No topo, selecione o <strong>ano<\u002Fstrong> e, se quiser, filtre por situação (Em andamento, Concluídos, Atrasados, Aguardando, Cancelados).<\u002Fp>\n              <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n                <span style=\"border:1px solid #DDD9D0;background:#fff;border-radius:8px;padding:7px 12px;font-size:12px;color:#4A4741\">2026 ▾<\u002Fspan>\n                <span style=\"border:1px solid #DDD9D0;background:#fff;border-radius:8px;padding:7px 12px;font-size:12px;color:#4A4741\">Todos os projetos ▾<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:18px;margin-bottom:20px\">\n            <div style=\"flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#7C3AED;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center\">2<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin:2px 0 7px\">Leia as barras<\u002Fh3>\n              <p style=\"font-size:14px;line-height:1.6;color:#4A4741;margin:0 0 14px\">Cada barra vai do <strong>início<\u002Fstrong> ao <strong>prazo de entrega<\u002Fstrong> do projeto. A <strong>cor<\u002Fstrong> indica a situação. Passe o olho pelos meses para enxergar sobreposições e picos de trabalho.<\u002Fp>\n              <div style=\"border:1px solid #E2E0DA;border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.05);background:#fff\">\n                <div style=\"display:grid;grid-template-columns:150px repeat(6,1fr);background:#0D0D0D;color:rgba(255,255,255,.6);font-size:10px;font-weight:700;text-transform:uppercase\">\n                  <div style=\"padding:8px 12px\">Projeto<\u002Fdiv>\n                  <div style=\"padding:8px 4px;text-align:center\">Jan<\u002Fdiv><div style=\"padding:8px 4px;text-align:center\">Fev<\u002Fdiv><div style=\"padding:8px 4px;text-align:center\">Mar<\u002Fdiv><div style=\"padding:8px 4px;text-align:center\">Abr<\u002Fdiv><div style=\"padding:8px 4px;text-align:center\">Mai<\u002Fdiv><div style=\"padding:8px 4px;text-align:center\">Jun<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:150px repeat(6,1fr);align-items:center;border-bottom:1px solid #F2F1ED\"><div style=\"padding:9px 12px;font-size:12px;font-weight:600\">Segurança M3<\u002Fdiv><div style=\"grid-column:2 / 5;padding:0 6px\"><div style=\"height:14px;border-radius:7px;background:#003DA5\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:150px repeat(6,1fr);align-items:center;border-bottom:1px solid #F2F1ED\"><div style=\"padding:9px 12px;font-size:12px;font-weight:600\">Ética Turma 2<\u002Fdiv><div style=\"grid-column:3 / 6;padding:0 6px\"><div style=\"height:14px;border-radius:7px;background:#E8002D\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:150px repeat(6,1fr);align-items:center\"><div style=\"padding:9px 12px;font-size:12px;font-weight:600\">NR-35<\u002Fdiv><div style=\"grid-column:4 / 8;padding:0 6px\"><div style=\"height:14px;border-radius:7px;background:#1A8A4A\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:11.5px;color:#4A4741\"><span style=\"display:flex;align-items:center;gap:5px\"><span style=\"width:11px;height:11px;border-radius:3px;background:#003DA5\"><\u002Fspan>Em andamento<\u002Fspan><span style=\"display:flex;align-items:center;gap:5px\"><span style=\"width:11px;height:11px;border-radius:3px;background:#1A8A4A\"><\u002Fspan>Concluído<\u002Fspan><span style=\"display:flex;align-items:center;gap:5px\"><span style=\"width:11px;height:11px;border-radius:3px;background:#E8002D\"><\u002Fspan>Atrasado<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:11px;padding:15px 17px;background:#F5F3FF;border:1px solid #ddd6fe;border-radius:12px\">\n            <span style=\"font-size:18px\">💡<\u002Fspan>\n            <div style=\"font-size:13.5px;line-height:1.6;color:#5b21b6\"><strong>Dica:<\u002Fstrong> o cronograma é montado a partir das datas de <strong>início<\u002Fstrong> e <strong>prazo<\u002Fstrong> de cada projeto. Se uma barra parecer errada, verifique essas datas na edição do projeto.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ══════ TUTORIAL 9 — MEDIÇÃO ══════ -->\n      <sc-if value=\"{{ isT9 }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"max-width:840px;margin:0 auto;animation:caFade .4s ease both\">\n          <div style=\"display:inline-block;background:#CFFAFE;color:#155E75;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 11px;border-radius:6px;margin-bottom:14px\">Acompanhamento<\u002Fdiv>\n          <h1 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-size:30px;font-weight:800;line-height:1.15;margin:0 0 12px\">Como confirmar a medição<\u002Fh1>\n          <p style=\"font-size:15px;line-height:1.65;color:#4A4741;margin:0 0 34px;max-width:680px\">A <strong>Medição<\u002Fstrong> reúne os projetos com todas as etapas concluídas, prontos para faturamento. Aqui você confirma que a medição foi realizada.<\u002Fp>\n\n          <div style=\"display:flex;gap:11px;padding:15px 17px;background:#FFF7ED;border:1px solid #FED7AA;border-radius:12px;margin-bottom:30px\"><span style=\"font-size:18px\">🔒<\u002Fspan><div style=\"font-size:13.5px;line-he
